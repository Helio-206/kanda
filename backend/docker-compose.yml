version: "3.9"

services:
  api:
    build:
      context: .
      args:
        TORCH_VARIANT: cpu
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      args:
        TORCH_VARIANT: cu124
    gpus: all
    volumes:
      - ./:/app
      - hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      GROUNDING_DINO_DEVICE: cuda
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    depends_on:
      - api
      - redis
      - db
    # concurrency=1: one GPU model instance per worker process
    command: celery -A app.tasks worker --loglevel=info --concurrency=1

  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: cidade_user
      POSTGRES_PASSWORD: cidade_pass
      POSTGRES_DB: cidade_em_foco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  hf_cache:
